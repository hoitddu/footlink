<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#d9ebf5",
              "secondary-fixed-dim": "#bbc8d0",
              "surface-container-lowest": "#ffffff",
              "tertiary-fixed": "#ffdbcb",
              "surface-bright": "#f4faff",
              "on-tertiary": "#ffffff",
              "secondary-container": "#d7e4ec",
              "on-primary-container": "#7ebdac",
              "surface-container-low": "#e7f6ff",
              "on-secondary": "#ffffff",
              "background": "#f4faff",
              "on-error": "#ffffff",
              "on-secondary-container": "#5a666d",
              "tertiary": "#511e00",
              "on-primary": "#ffffff",
              "primary": "#00342b",
              "surface-container": "#dff1fb",
              "inverse-primary": "#94d3c1",
              "primary-fixed": "#afefdd",
              "primary-container": "#004d40",
              "surface-tint": "#29695b",
              "outline-variant": "#bfc9c4",
              "error-container": "#ffdad6",
              "on-secondary-fixed-variant": "#3c494f",
              "on-primary-fixed-variant": "#065043",
              "on-surface-variant": "#3f4945",
              "surface-variant": "#d4e5ef",
              "on-secondary-fixed": "#111d23",
              "on-tertiary-fixed": "#341100",
              "tertiary-container": "#742e00",
              "on-surface": "#0d1e25",
              "on-tertiary-container": "#ff955e",
              "outline": "#707975",
              "inverse-on-surface": "#e2f3fd",
              "primary-fixed-dim": "#94d3c1",
              "surface-dim": "#cbdde7",
              "on-error-container": "#93000a",
              "secondary": "#546067",
              "surface": "#f4faff",
              "on-primary-fixed": "#00201a",
              "error": "#ba1a1a",
              "secondary-fixed": "#d7e4ec",
              "on-tertiary-fixed-variant": "#7a3000",
              "on-background": "#0d1e25",
              "surface-container-highest": "#d4e5ef",
              "tertiary-fixed-dim": "#ffb692",
              "inverse-surface": "#23333a"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f4faff;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d4e5ef;
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 z-50 w-full bg-[#f4faff] dark:bg-[#0d1e25] no-border">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-[#00342b] dark:text-[#afefdd] hover:bg-[#d4e5ef] dark:hover:bg-[#3f4945] p-2 rounded-full transition-colors Active: scale-95 duration-150">arrow_back</button>
<h1 class="font-['Manrope'] font-bold tracking-tight text-[#0d1e25] dark:text-[#f4faff] text-lg">경기 생성</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high">
<img alt="Profile" class="w-full h-full object-cover" data-alt="close-up portrait of a sporty person with a confident smile, high-end athletic photography style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDXjFpWhPQDGvUHvMST77gJf4piGpS2s3r21MB0hQ4xA0n81Jokl7I9hV-MS9OvjVuzZEwWkANlFOCxeWvDpZlpER4jZeYnF9CTaQhQUy3ea9OFjc-eEPlk1hbipP4vTkcz-hiTthTcecvbsKXLX86zgVcbYtFSAd-181s_oLAatFerU8XHmgezxthc4RtC3BgkrChiHfzbtUG2qyvfvsRxh45jvp0qQ72cqEeyGIimk6uhWMLhTT_3zfuK161wr8xgpZAlaHs"/>
</div>
</div>
</header>
<main class="flex-grow pt-20 pb-32 px-6 max-w-2xl mx-auto w-full">
<!-- Main Form Container -->
<div class="space-y-8">
<!-- Recruitment Type Segmented Control -->
<section class="space-y-3">
<label class="font-label font-semibold text-sm text-on-surface-variant uppercase tracking-wider">Recruitment Type</label>
<div class="flex p-1 bg-surface-container-high rounded-xl gap-1">
<button class="flex-1 py-3 text-sm font-bold rounded-lg bg-primary text-on-primary shadow-lg transition-all duration-200">용병 구함</button>
<button class="flex-1 py-3 text-sm font-semibold rounded-lg text-on-secondary-container hover:bg-surface-container-highest transition-all duration-200">부분 합류</button>
<button class="flex-1 py-3 text-sm font-semibold rounded-lg text-on-secondary-container hover:bg-surface-container-highest transition-all duration-200">팀매치</button>
</div>
</section>
<!-- Number Stepper & Level Dropdown (Asymmetric Layout) -->
<div class="grid grid-cols-2 gap-4">
<section class="space-y-3">
<label class="font-label font-semibold text-sm text-on-surface-variant uppercase tracking-wider">Needed Count</label>
<div class="flex items-center justify-between bg-surface-container-lowest p-2 rounded-xl shadow-sm border border-outline-variant/15">
<button class="w-10 h-10 flex items-center justify-center bg-surface-container-high rounded-lg text-primary hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="font-headline font-bold text-xl">2</span>
<button class="w-10 h-10 flex items-center justify-center bg-primary rounded-lg text-on-primary hover:bg-primary-container transition-colors shadow-md">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</section>
<section class="space-y-3">
<label class="font-label font-semibold text-sm text-on-surface-variant uppercase tracking-wider">Level</label>
<div class="relative">
<select class="w-full h-[58px] bg-surface-container-lowest rounded-xl border-none shadow-sm focus:ring-2 focus:ring-primary appearance-none px-4 font-semibold text-on-surface">
<option>상관없음</option>
<option>초급 (Beginner)</option>
<option>중급 (Intermediate)</option>
<option>고급 (Advanced)</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</section>
</div>
<!-- Date/Time Selector -->
<section class="space-y-3">
<label class="font-label font-semibold text-sm text-on-surface-variant uppercase tracking-wider">Date &amp; Time</label>
<div class="flex items-center bg-surface-container-lowest p-4 rounded-xl shadow-sm border border-outline-variant/15 group hover:border-primary/30 transition-all">
<span class="material-symbols-outlined text-primary mr-3">calendar_today</span>
<div class="flex-grow">
<span class="text-on-surface font-bold">오늘 20:30</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</div>
</section>
<!-- Location Input -->
<section class="space-y-3">
<label class="font-label font-semibold text-sm text-on-surface-variant uppercase tracking-wider">Location</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">location_on</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-high rounded-xl border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all font-semibold" placeholder="풋살장 검색" type="text" value="성수동 / XYZ 풋살장"/>
</div>
</section>
<!-- Fee Input -->
<section class="space-y-3">
<label class="font-label font-semibold text-sm text-on-surface-variant uppercase tracking-wider">Fee (KRW)</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">payments</span>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-high rounded-xl border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all font-bold text-lg" placeholder="금액 입력" type="text" value="8,000"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 font-bold text-on-surface-variant">원</span>
</div>
</section>
<!-- Contact Options (Radio) -->
<section class="space-y-3">
<label class="font-label font-semibold text-sm text-on-surface-variant uppercase tracking-wider">Contact Method</label>
<div class="space-y-3">
<label class="flex items-center p-4 bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/15 cursor-pointer hover:border-primary/20 transition-all">
<input checked="" class="w-5 h-5 text-primary focus:ring-primary border-outline-variant bg-surface-container-high" name="contact" type="radio"/>
<span class="ml-3 font-semibold text-on-surface">Participate request only (앱 내 신청)</span>
</label>
<label class="flex items-center p-4 bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/15 cursor-pointer hover:border-primary/20 transition-all">
<input class="w-5 h-5 text-primary focus:ring-primary border-outline-variant bg-surface-container-high" name="contact" type="radio"/>
<span class="ml-3 font-semibold text-on-surface">Openchat link (오픈채팅 링크)</span>
</label>
</div>
</section>
<!-- Description -->
<section class="space-y-3 pb-4">
<label class="font-label font-semibold text-sm text-on-surface-variant uppercase tracking-wider">Description</label>
<textarea class="w-full p-4 bg-surface-container-high rounded-xl border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all font-medium custom-scrollbar" placeholder="경기 진행 방식, 주차 정보 등을 적어주세요." rows="4"></textarea>
</section>
</div>
</main>
<!-- Bottom Action & Navigation -->
<div class="fixed bottom-0 left-0 w-full z-50">
<!-- Floating Primary Button -->
<div class="px-6 pb-6">
<button class="w-full h-14 bg-gradient-to-br from-[#00342b] to-[#004d40] text-white rounded-2xl font-bold text-lg shadow-xl hover:scale-[1.02] active:scale-95 transition-all duration-200 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">send</span>
                게시하기
            </button>
</div>
<!-- BottomNavBar (Suppressed on focused screens, but requested here) -->
<nav class="bg-[#d4e5ef]/70 dark:bg-[#23333a]/70 backdrop-blur-xl rounded-t-[2rem] shadow-[0_-4px_24px_rgba(13,30,37,0.06)] px-4 pb-safe flex justify-around items-center py-3">
<div class="flex flex-col items-center justify-center text-[#3f4945] dark:text-[#bfc9c4] px-4 py-2 hover:text-[#00342b] transition-all">
<span class="material-symbols-outlined">home</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold uppercase tracking-wider">Home</span>
</div>
<div class="flex flex-col items-center justify-center bg-gradient-to-br from-[#00342b] to-[#004d40] text-white rounded-2xl px-6 py-2 scale-110 shadow-lg translate-y-[-2px]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold uppercase tracking-wider">Create</span>
</div>
<div class="flex flex-col items-center justify-center text-[#3f4945] dark:text-[#bfc9c4] px-4 py-2 hover:text-[#00342b] transition-all">
<span class="material-symbols-outlined">event_note</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold uppercase tracking-wider">Activity</span>
</div>
<div class="flex flex-col items-center justify-center text-[#3f4945] dark:text-[#bfc9c4] px-4 py-2 hover:text-[#00342b] transition-all">
<span class="material-symbols-outlined">person</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold uppercase tracking-wider">Profile</span>
</div>
</nav>
</div>
</body></html>
