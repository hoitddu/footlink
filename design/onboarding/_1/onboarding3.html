<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Schedule Your Match - Pitch Velocity</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container": "#eceeed",
              "tertiary-fixed": "#94f990",
              "on-secondary-fixed-variant": "#3a4a49",
              "on-tertiary-fixed-variant": "#005313",
              "surface-container-highest": "#e1e3e2",
              "outline-variant": "#c3c8c1",
              "secondary-container": "#d4e6e5",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-container": "#43a649",
              "primary-fixed": "#d0e9d4",
              "error": "#ba1a1a",
              "on-primary-fixed-variant": "#364c3c",
              "surface-bright": "#f8faf9",
              "surface-container-low": "#f2f4f3",
              "primary": "#061b0e",
              "primary-fixed-dim": "#b4cdb8",
              "on-tertiary-fixed": "#002204",
              "on-primary-fixed": "#0b2013",
              "on-background": "#191c1c",
              "on-primary": "#ffffff",
              "primary-container": "#1b3022",
              "surface-dim": "#d8dada",
              "on-secondary-container": "#576867",
              "on-tertiary": "#ffffff",
              "on-secondary": "#ffffff",
              "tertiary-fixed-dim": "#78dc77",
              "surface-variant": "#e1e3e2",
              "on-surface-variant": "#434843",
              "secondary-fixed-dim": "#b8cac9",
              "on-error": "#ffffff",
              "on-secondary-fixed": "#0e1e1e",
              "tertiary-container": "#003408",
              "outline": "#737973",
              "inverse-primary": "#b4cdb8",
              "surface-tint": "#4d6453",
              "error-container": "#ffdad6",
              "on-error-container": "#93000a",
              "secondary-fixed": "#d4e6e5",
              "surface": "#f8faf9",
              "tertiary": "#001d03",
              "on-surface": "#191c1c",
              "secondary": "#516161",
              "surface-container-high": "#e6e9e8",
              "background": "#f8faf9",
              "inverse-on-surface": "#eff1f0",
              "inverse-surface": "#2e3131"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "1rem", "xl": "1.25rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .turf-texture {
        background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
        background-size: 8px 8px;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
      }
      .kinetic-gradient {
        background: linear-gradient(135deg, #061b0e 0%, #1b3022 100%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 py-4 bg-transparent backdrop-blur-xl">
<button class="flex items-center justify-center w-10 h-10 transition-all duration-300 ease-in-out active:scale-95 text-emerald-950 dark:text-emerald-50 hover:bg-emerald-100/20">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="text-xl font-black text-emerald-950 dark:text-emerald-50 font-['Space_Grotesk'] tracking-tight">PITCH VELOCITY</span>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<main class="flex-1 pt-32 pb-44 px-6 max-w-2xl mx-auto w-full">
<!-- Editorial Header -->
<div class="mb-8">
<h1 class="font-headline font-bold text-primary tracking-tight text-3xl">언제 참여할까요?</h1>
<!-- Small Date Picker Button -->
<button class="mt-4 flex items-center gap-2 px-3 py-1.5 rounded-full border border-outline-variant/40 text-on-surface-variant hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined text-sm" data-icon="calendar_today">calendar_today</span>
<span class="text-xs font-bold font-label uppercase tracking-wider">날짜 선택</span>
</button>
</div>
<!-- Date Grid Selection -->
<div class="grid grid-cols-2 gap-4">
<!-- Selected Option: Today -->
<button class="relative group overflow-hidden bg-gradient-to-br from-primary to-primary-container h-44 rounded-xl flex flex-col justify-end p-6 transition-all duration-300 active:scale-[0.98] shadow-xl">
<div class="absolute inset-0 turf-texture opacity-30"></div>
<span class="material-symbols-outlined text-white/20 absolute -top-4 -left-4 text-8xl" style="font-variation-settings: 'FILL' 1;">today</span>
<div class="relative z-10">
<p class="text-on-primary-container text-xs font-bold uppercase tracking-widest mb-1">Today</p>
<p class="text-white text-2xl font-black font-headline tracking-tighter">오늘</p>
</div>
</button>
<!-- Regular Option: Tomorrow -->
<button class="group bg-surface-container-low hover:bg-surface-container h-44 rounded-xl flex flex-col justify-end p-6 transition-all duration-300 active:scale-[0.98]">
<div class="relative z-10">
<p class="text-on-surface-variant/60 text-xs font-bold uppercase tracking-widest mb-1">Tomorrow</p>
<p class="text-primary text-2xl font-black font-headline tracking-tighter">내일</p>
</div>
</button>
<!-- Regular Option: Saturday -->
<button class="group bg-surface-container-low hover:bg-surface-container h-44 rounded-xl flex flex-col justify-end p-6 transition-all duration-300 active:scale-[0.98]">
<div class="relative z-10">
<p class="text-on-surface-variant/60 text-xs font-bold uppercase tracking-widest mb-1">Saturday</p>
<p class="text-primary text-2xl font-black font-headline tracking-tighter">토요일</p>
</div>
</button>
<!-- Regular Option: Sunday -->
<button class="group bg-surface-container-low hover:bg-surface-container h-44 rounded-xl flex flex-col justify-end p-6 transition-all duration-300 active:scale-[0.98]">
<div class="relative z-10">
<p class="text-on-surface-variant/60 text-xs font-bold uppercase tracking-widest mb-1">Sunday</p>
<p class="text-primary text-2xl font-black font-headline tracking-tighter">일요일</p>
</div>
</button>
</div>
<!-- Visual Anchor (Pitch Atmosphere) -->
</main>
<!-- Bottom Navigation Shell -->
<footer class="fixed bottom-0 left-0 w-full z-50 px-8 pb-10 pt-6 bg-white/70 backdrop-blur-2xl rounded-t-[2.5rem] shadow-[0_-8px_40px_rgba(0,0,0,0.05)]">
<div class="max-w-md mx-auto">
<!-- Primary Action (Updated to match SCREEN_2 style) -->
<button class="w-full kinetic-gradient text-on-primary py-5 rounded-xl font-headline font-bold text-lg tracking-tight shadow-xl shadow-primary/20 flex items-center justify-center gap-2 group hover:scale-[1.02] transition-transform duration-300 active:scale-95">
<span>NEXT</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</footer>
<!-- Background Decoration -->
<div class="fixed top-0 right-0 -z-10 w-1/2 h-screen bg-gradient-to-bl from-emerald-50/50 to-transparent pointer-events-none"></div>
</body></html>
